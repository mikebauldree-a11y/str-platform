{% extends "base.html" %}
{% block content %}

<div class="container py-5 mt-md-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                
                <div class="bg-success py-5 text-center text-white">
                    <div class="mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-check-circle-fill shadow-sm rounded-circle" viewBox="0 0 16 16">
                          <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                    </div>
                    <h2 class="fw-bold mb-0">Payment Successful!</h2>
                </div>

                <div class="card-body p-4 p-md-5 text-center">
                    <div id="status-container">
                        <div class="p-4 bg-light rounded-4 border border-dashed text-center">
                            <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <h5 class="fw-bold text-dark">Building Your Pro Forma...</h5>
                            <p class="small text-muted mb-0">
                                We are currently calculating your 5-year projections. <br>
                                <strong>This usually takes 5-10 seconds.</strong>
                            </p>
                        </div>
                    </div>

                    <div class="mt-5">
                        <a href="/" class="text-decoration-none small fw-bold text-primary">
                            <i class="bi bi-arrow-left me-1"></i> Analyze Another Property
                        </a>
                    </div>
                </div>
            </div>
            
            <p class="text-center text-muted small mt-4">
                Need help? Contact our data team at <span class="text-dark fw-medium">support@caribbeanstr.com</span>
            </p>
        </div>
    </div>
</div>

<script>
    const orderId = "{{ order_id }}";
    const statusContainer = document.getElementById('status-container');

    async function checkStatus() {
        try {
            const response = await fetch(`/check_status/${orderId}`);
            const data = await response.json();

            if (data.status === 'ready') {
                // Change the UI to show the Download Button
                statusContainer.innerHTML = `
                    <div class="p-4 bg-primary bg-opacity-10 rounded-4 border border-primary border-opacity-25">
                        <h4 class="fw-bold text-dark mb-3">Your Report is Ready!</h4>
                        <a href="/download/${orderId}" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">
                            <i class="bi bi-file-earmark-pdf me-2"></i> Download Pro Forma
                        </a>
                        <p class="small text-muted mt-3 mb-0">
                            Your analysis is complete and ready for review.
                        </p>
                    </div>
                `;
                // Stop checking once it's ready
                clearInterval(statusInterval);
            }
        } catch (error) {
            console.error("Status check failed:", error);
        }
    }

    // Check the server every 2 seconds
    const statusInterval = setInterval(checkStatus, 2000);
    
    // Also run once immediately on load
    checkStatus();
</script>

{% endblock %}
